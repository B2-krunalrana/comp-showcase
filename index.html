<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Product Store</title>
    </head>
    <body>
        <!-- Location & Language Info Bar -->
        <div class="info-bar">
            <div class="info-item">
                <span id="locationInfo">📍 Detecting location...</span>
            </div>
            <div class="info-item">
                <select id="languageSelector" class="language-selector">
                    <option value="en">🌐 English</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="it">🇮🇹 Italiano</option>
                    <option value="pt">🇵🇹 Português</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="zh">🇨🇳 中文</option>
                </select>
            </div>
            <div class="info-item">
                <span id="currencyInfo">💱 USD</span>
            </div>
        </div>

        <!-- Header with controls -->
        <div class="header">
            <h1>Online Demo Store By Krunal Rana</h1>
            <div class="header-controls">
                <input type="text" class="search-box" id="searchBox" placeholder="Search products...">
                <select class="sort-dropdown" id="sortDropdown">
                    <option value="default">Sort by: Default</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Rating: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
                <select class="filter-dropdown" id="filterDropdown">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="home">Home</option>
                    <option value="beauty">Beauty</option>
                </select>
                <div class="cart-icon" id="cartIcon">
                    🛒
                    <div class="cart-badge" id="cartBadge">0</div>
                </div>
            </div>
        </div>

        <!-- Stats bar -->
        <div class="stats">
            <span>Total Products: <strong id="totalProducts">0</strong></span>
            <span style="margin-left: 30px;">Favorites: <strong id="favCount">0</strong></span>
            <span style="margin-left: 30px;">Cart Items: <strong id="cartCount">0</strong></span>
            <span style="margin-left: 30px;">Timezone: <strong id="timezoneInfo">--</strong></span>
        </div>

        <!-- Products container -->
        <div class="comp-01" id="productsContainer">
            <div class="loading">Loading products...</div>
        </div>

        <!-- Cart Modal -->
        <div class="modal" id="cartModal">
            <div class="modal-content">
                <span class="close-modal" id="closeCart">&times;</span>
                <h2>Shopping Cart</h2>
                <div id="cartItems"></div>
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="totalPrice">$0.00</span>
                </div>
            </div>
        </div>

        <script>
            // ============ STATE MANAGEMENT ============
            let allProducts = [];
            let filteredProducts = [];
            let cart = [];
            let favorites = [];
            let sortBy = 'default';
            let currentLanguage = 'en';
            let userLocation = null;
            let exchangeRates = {};
            let currentCurrency = 'USD';

            // ============ CHROME APIS & LOCAL STORAGE ============
            const DB_KEY = 'productStore_cart';
            const FAV_KEY = 'productStore_favorites';
            const LANG_KEY = 'productStore_language';
            const LOCATION_KEY = 'productStore_location';

            // Initialize IndexedDB-like storage with localStorage
            function initializeStorage() {
                cart = JSON.parse(localStorage.getItem(DB_KEY)) || [];
                favorites = JSON.parse(localStorage.getItem(FAV_KEY)) || [];
                updateCartUI();
                updateStatsUI();
            }

            function saveCartToStorage() {
                localStorage.setItem(DB_KEY, JSON.stringify(cart));
                updateCartUI();
                updateStatsUI();
            }

            function saveFavoritesToStorage() {
                localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
                updateStatsUI();
            }

            // ============ GEOLOCATION API ============
            function initializeLocation() {
                const savedLocation = localStorage.getItem(LOCATION_KEY);
                if (savedLocation) {
                    userLocation = JSON.parse(savedLocation);
                    updateLocationUI();
                    return;
                }

                // Try native Geolocation API first
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const { latitude, longitude } = position.coords;
                            // Reverse geocoding using open-source API
                            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`)
                            .then(r => r.json())
                            .then(data => {
                                userLocation = {
                                    country: data.address?.country || 'Unknown',
                                    city: data.address?.city || data.address?.town || 'Unknown',
                                    lat: latitude,
                                    lon: longitude,
                                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                                };
                                localStorage.setItem(LOCATION_KEY, JSON.stringify(userLocation));
                                updateLocationUI();
                                fetchExchangeRates();
                            });
                        },
                        () => {
                            // Fallback: Use IP-based geolocation
                            fetch('https://ipapi.co/json/')
                            .then(r => r.json())
                            .then(data => {
                                userLocation = {
                                    country: data.country_name || 'Unknown',
                                    city: data.city || 'Unknown',
                                    lat: data.latitude,
                                    lon: data.longitude,
                                    timezone: data.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone,
                                    currency: data.currency || 'USD'
                                };
                                localStorage.setItem(LOCATION_KEY, JSON.stringify(userLocation));
                                updateLocationUI();
                                fetchExchangeRates();
                            })
                            .catch(() => {
                                console.warn('Could not get location');
                            });
                        }
                    );
                }
            }

            function updateLocationUI() {
                if (userLocation) {
                    document.getElementById('locationInfo').textContent = 
                        `📍 ${userLocation.city}, ${userLocation.country}`;
                    document.getElementById('timezoneInfo').textContent = userLocation.timezone;
                }
            }

            // ============ CURRENCY & EXCHANGE RATES ============
            function fetchExchangeRates() {
                fetch('https://api.exchangerate-api.com/v4/latest/USD')
                .then(r => r.json())
                .then(data => {
                    exchangeRates = data.rates;
                    console.log('✅ Exchange rates loaded:', exchangeRates);
                })
                .catch(err => console.warn('Exchange rates unavailable:', err));
            }

            // ============ TRANSLATION API ============
            const translations = {
                en: { search: 'Search products...', cart: 'Shopping Cart', addCart: 'Add to Cart', total: 'Total:', remove: 'Remove', noProducts: 'No products found' },
                es: { search: 'Buscar productos...', cart: 'Carrito de Compras', addCart: 'Añadir al Carrito', total: 'Total:', remove: 'Eliminar', noProducts: 'No hay productos' },
                fr: { search: 'Rechercher des produits...', cart: 'Panier', addCart: 'Ajouter au Panier', total: 'Total:', remove: 'Supprimer', noProducts: 'Aucun produit trouvé' },
                de: { search: 'Produkte durchsuchen...', cart: 'Einkaufswagen', addCart: 'Zum Warenkorb', total: 'Insgesamt:', remove: 'Entfernen', noProducts: 'Keine Produkte gefunden' },
                it: { search: 'Cerca prodotti...', cart: 'Carrello', addCart: 'Aggiungi al Carrello', total: 'Totale:', remove: 'Rimuovi', noProducts: 'Nessun prodotto trovato' },
                pt: { search: 'Pesquisar produtos...', cart: 'Carrinho', addCart: 'Adicionar ao Carrinho', total: 'Total:', remove: 'Remover', noProducts: 'Nenhum produto encontrado' },
                ja: { search: '商品を検索...', cart: 'ショッピングカート', addCart: 'カートに追加', total: '合計:', remove: '削除', noProducts: '製品が見つかりません' },
                zh: { search: '搜索产品...', cart: '购物车', addCart: '加入购物车', total: '总计:', remove: '移除', noProducts: '未找到产品' }
            };

            function setLanguage(lang) {
                currentLanguage = lang;
                localStorage.setItem(LANG_KEY, lang);
                document.getElementById('searchBox').placeholder = translations[lang].search;
                renderProducts(filteredProducts);
                console.log(`✅ Language changed to: ${lang}`);
            }

            function formatPrice(price) {
                const symbols = {
                    'USD': '$',
                    'EUR': '€',
                    'GBP': '£',
                    'INR': '₹',
                    'JPY': '¥',
                    'AUD': 'A$',
                    'CAD': 'C$'
                };
                const symbol = symbols[currentCurrency] || currentCurrency + ' ';
                if (currentCurrency === 'USD') return symbol + price.toFixed(2);
                const converted = (price * (exchangeRates[currentCurrency] || 1)).toFixed(2);
                return symbol + converted;
            }

            // ============ FETCH WITH CACHING ============
            const API_URL = 'https://dummyjson.com/products';

            fetch(API_URL, { method: 'GET' })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }
                return response.json(); 
            })
            .then(data => {
                console.log('✅ API Data loaded:', data);
                allProducts = data.products.slice(0, 10);
                filteredProducts = [...allProducts];
                initializeStorage();
                initializeLocation();
                currentLanguage = localStorage.getItem(LANG_KEY) || 'en';
                document.getElementById('languageSelector').value = currentLanguage;
                renderProducts(filteredProducts);
                attachEventListeners();
                observeImagesForLazyLoading();
            })
            .catch(error => {
                console.error('❌ Fetch execution failed:', error.message);
                showErrorState(error);
            });

            // ============ INTERSECTION OBSERVER FOR LAZY LOADING ============
            function observeImagesForLazyLoading() {
                const images = document.querySelectorAll('img');
                const imageObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            img.style.opacity = '0';
                            setTimeout(() => {
                                img.style.opacity = '1';
                                img.style.transition = 'opacity 0.5s ease';
                            }, 100);
                            observer.unobserve(img);
                        }
                    });
                });
                images.forEach(img => imageObserver.observe(img));
            }

            // ============ RENDER PRODUCTS ============
            function renderProducts(products) {
                const container = document.getElementById('productsContainer');
                
                if (products.length === 0) {
                    container.innerHTML = `<div class="loading">${translations[currentLanguage]?.noProducts || 'No products found'}</div>`;
                    return;
                }

                container.innerHTML = products.map(product => {
                    const isFav = favorites.some(fav => fav.id === product.id);
                    return `
                        <div class="product-item" data-id="${product.id}">
                            <div class="image-con">
                                <img src="${product.thumbnail}" alt="${product.title}">
                                <button class="favorite-btn ${isFav ? 'active' : ''}" 
                                        onclick="toggleFavorite(${product.id})" 
                                        title="Add to favorites">
                                    ${isFav ? '❤️' : '🤍'}
                                </button>
                                <div class="image-overlay">${product.description.substring(0, 60)}...</div>
                            </div>
                            <div class="title-com">
                                <h3>${product.title}</h3>
                                <p>${product.description.substring(0, 50)}...</p>
                                <div class="product-footer">
                                    <div class="product-price-info">
                                        <div class="product-price">${formatPrice(product.price)}</div>
                                        <div class="product-rating">⭐ ${product.rating}</div>
                                    </div>
                                    <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                                        ${translations[currentLanguage]?.addCart || 'Add to Cart'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('totalProducts').textContent = products.length;
                observeImagesForLazyLoading();
            }

            // ============ SEARCH & FILTER ============
            function attachEventListeners() {
                document.getElementById('searchBox').addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    filterAndSortProducts(searchTerm);
                });

                document.getElementById('sortDropdown').addEventListener('change', (e) => {
                    sortBy = e.target.value;
                    filterAndSortProducts();
                });

                document.getElementById('filterDropdown').addEventListener('change', (e) => {
                    filterAndSortProducts();
                });

                document.getElementById('cartIcon').addEventListener('click', showCartModal);
                document.getElementById('closeCart').addEventListener('click', closeCartModal);
                document.getElementById('languageSelector').addEventListener('change', (e) => {
                    setLanguage(e.target.value);
                });
            }

            function filterAndSortProducts(searchTerm = '') {
                const categoryFilter = document.getElementById('filterDropdown').value;
                
                // Apply filters
                filteredProducts = allProducts.filter(product => {
                    const matchesSearch = product.title.toLowerCase().includes(searchTerm) ||
                                        product.description.toLowerCase().includes(searchTerm);
                    const matchesCategory = !categoryFilter || product.category === categoryFilter;
                    return matchesSearch && matchesCategory;
                });

                // Apply sorting
                filteredProducts.sort((a, b) => {
                    switch(sortBy) {
                        case 'price-asc':
                            return a.price - b.price;
                        case 'price-desc':
                            return b.price - a.price;
                        case 'rating':
                            return b.rating - a.rating;
                        case 'name':
                            return a.title.localeCompare(b.title);
                        default:
                            return 0;
                    }
                });

                renderProducts(filteredProducts);
            }

            // ============ CART MANAGEMENT ============
            function addToCart(productId) {
                const product = allProducts.find(p => p.id === productId);
                const existingItem = cart.find(item => item.id === productId);

                if (existingItem) {
                    existingItem.quantity++;
                } else {
                    cart.push({ ...product, quantity: 1 });
                }

                saveCartToStorage();
                animateCartIcon();
            }

            function removeFromCart(productId) {
                cart = cart.filter(item => item.id !== productId);
                saveCartToStorage();
            }

            function updateCartQuantity(productId, quantity) {
                const item = cart.find(item => item.id === productId);
                if (item) {
                    item.quantity = Math.max(1, quantity);
                    saveCartToStorage();
                    renderCartItems();
                }
            }

            function animateCartIcon() {
                const cartIcon = document.getElementById('cartIcon');
                cartIcon.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    cartIcon.style.transform = 'scale(1)';
                }, 200);
            }

            function updateCartUI() {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                document.getElementById('cartBadge').textContent = totalItems;
                document.getElementById('cartCount').textContent = totalItems;
            }

            function updateStatsUI() {
                document.getElementById('favCount').textContent = favorites.length;
            }

            function showCartModal() {
                renderCartItems();
                document.getElementById('cartModal').classList.add('active');
            }

            function closeCartModal() {
                document.getElementById('cartModal').classList.remove('active');
            }

            function renderCartItems() {
                const cartItemsContainer = document.getElementById('cartItems');
                
                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = '<p>Your cart is empty</p>';
                    document.getElementById('totalPrice').textContent = formatPrice(0);
                    return;
                }

                let total = 0;
                cartItemsContainer.innerHTML = cart.map(item => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;
                    return `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <h4>${item.title}</h4>
                                <p>${formatPrice(item.price)} each</p>
                            </div>
                            <div class="cart-item-quantity">
                                <button class="qty-btn" onclick="updateCartQuantity(${item.id}, ${item.quantity - 1})">−</button>
                                <span>${item.quantity}</span>
                                <button class="qty-btn" onclick="updateCartQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                            <div>${formatPrice(itemTotal)}</div>
                            <button class="remove-from-cart-btn" onclick="removeFromCart(${item.id})">${translations[currentLanguage]?.remove || 'Remove'}</button>
                        </div>
                    `;
                }).join('');

                document.getElementById('totalPrice').textContent = formatPrice(total);
            }

            // ============ FAVORITES ============
            function toggleFavorite(productId) {
                const product = allProducts.find(p => p.id === productId);
                const index = favorites.findIndex(fav => fav.id === productId);

                if (index > -1) {
                    favorites.splice(index, 1);
                } else {
                    favorites.push(product);
                }

                saveFavoritesToStorage();
                renderProducts(filteredProducts);
            }

            // ============ ERROR HANDLING ============
            function showErrorState(err) {
                console.error('Error:', err);
                document.getElementById('productsContainer').innerHTML = 
                    `<div class="loading" style="color: #ff6b6b;">Failed to load products. Please refresh the page.</div>`;
            }

            // RequestAnimationFrame for smooth scroll effect
            window.addEventListener('scroll', () => {
                requestAnimationFrame(() => {
                    const scrolled = window.scrollY;
                    if (scrolled > 100) {
                        document.querySelector('.header').style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
                    } else {
                        document.querySelector('.header').style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
                    }
                });
            });

        </script>
    </body>
</html>
